  <script type="text/babel" data-presets="react">
    const { useState, useCallback, memo, useEffect } = React;

    // ==========================================

    const Settings = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>;
    const Edit3 = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>;
    const Eraser = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21"/><path d="M22 21H7"/><path d="m5 11 9 9"/></svg>;
    const FileText = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/></svg>;
    const XCircle = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></svg>;
    const Download = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>;
    const Info = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>;

    // ==========================================
    // Enums
    // ==========================================
    const PracticeMode = {
      READING: 'reading',
      WRITING: 'writing'
    };

    const GridStyle = {
      TIAN: 'tian',
      MI: 'mi',
      NONE: 'none'
    };

    // ==========================================
    // Utilities & API Services
    // ==========================================
    const loadScript = (src, globalName) => {
      return new Promise((resolve, reject) => {
        if (window[globalName]) return resolve(window[globalName]);
        const script = document.createElement('script');
        script.src = src;
        script.crossOrigin = 'anonymous';
        script.onload = () => resolve(window[globalName]);
        script.onerror = () => reject(new Error(`Failed to load ${src}`));
        document.head.appendChild(script);
      });
    };

    // 移除內建的系統 API Key，完全由使用者自行輸入

    async function fetchWithBackoff(url, options, maxRetries = 3) {
      const delays = [1000, 2000, 4000];
      for (let i = 0; i < maxRetries; i++) {
        try {
          const response = await fetch(url, options);
          if (!response.ok) {
            const errorData = await response.json().catch(() => ({}));
            const status = response.status;
            let message = errorData.error?.message || "網路請求失敗";
            
            if (status === 429) throw new Error("429:API 請求太頻繁，請稍等一分鐘後再試。");
            if (status === 400) throw new Error(`400:無效的請求格式 (${message})`);
            if (status === 403) throw new Error("403:權限不足，您的金鑰可能無效或已被禁用。");
            if (status === 404) throw new Error(`404:找不到模型 (${message})`);
            if (status === 503) throw new Error(`503:伺服器繁忙 (${message})`);
            
            throw new Error(`(狀態碼 ${status}): ${message}`);
          }
          return await response.json();
        } catch (error) {
          if (error.message && (error.message.includes("400:") || error.message.includes("403:") || error.message.includes("404:"))) {
            throw error;
          }
          if (i === maxRetries - 1) throw error;
          await new Promise(res => setTimeout(res, delays[i]));
        }
      }
    }

    const parseArticleWithGemini = async (text, targetChars, useRandomCommonWord, apiKeyToUse) => {
      const ruleSpecifics = useRandomCommonWord
        ? `1. 對於使用者提供的「每個」生字，隨機生成一個適合國小程度且包含該生字的常用語詞。
           2. 每個生字只輸出一組語詞。
           3. 格式: "[語詞]。"`
        : `1. 對於使用者提供的「每個」生字，在課文中找出一個包含該字的語詞。
           2. 每個生字只輸出一組語詞。
           3. 格式: "[語詞]。"`;

      const systemInstruction = `
      你是一位台灣的小學國語老師。
      你的任務是將課文或生字轉換為練習卷。
      
      規則：
      ${ruleSpecifics}
      4. 必須為所有漢字提供台灣標準注音。
      5. 將句號視為標點符號 (isPunctuation=true)。
      6. 回傳 STRICT JSON 格式。
      `;

      const payload = {
        contents: [{ parts: [{ text: `【課文內容】\n${text}\n\n【指定生字】\n${targetChars}` }] }],
        systemInstruction: { parts: [{ text: systemInstruction }] },
        generationConfig: {
          responseMimeType: "application/json",
          responseSchema: {
            type: "OBJECT",
            properties: {
              title: { type: "STRING" },
              sentences: {
                type: "ARRAY",
                items: {
                  type: "OBJECT",
                  properties: {
                    id: { type: "STRING" },
                    words: {
                      type: "ARRAY",
                      items: {
                        type: "OBJECT",
                        properties: {
                          id: { type: "STRING" },
                          isTargetKeyword: { type: "BOOLEAN" },
                          characters: {
                            type: "ARRAY",
                            items: {
                              type: "OBJECT",
                              properties: {
                                id: { type: "STRING" },
                                char: { type: "STRING" },
                                zhuyin: { type: "STRING" },
                                isPunctuation: { type: "BOOLEAN" },
                                isHidden: { type: "BOOLEAN" },
                                isZhuyinHidden: { type: "BOOLEAN" }
                              },
                              required: ["char", "zhuyin", "id"]
                            }
                          }
                        },
                        required: ["characters", "id"]
                      }
                    }
                  },
                  required: ["words", "id"]
                }
              }
            },
            required: ["sentences", "title"]
          }
        }
      };

      const modelsToTry = [
        "gemini-1.5-flash-latest",
        "gemini-1.5-flash",
        "gemini-1.5-pro-latest",
        "gemini-1.5-pro",
        "gemini-2.5-flash"
      ];

      let lastError = null;

      for (const model of modelsToTry) {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKeyToUse}`;
        try {
          const result = await fetchWithBackoff(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
          const responseText = result.candidates?.[0]?.content?.parts?.[0]?.text;
          
          if (!responseText) throw new Error("AI 沒有回應，請檢查網路狀態或稍後再試。");
          
          let cleanedText = responseText.replace(/```json/gi, '').replace(/```/g, '').trim();
          const jsonMatch = cleanedText.match(/\{[\s\S]*\}/);
          if (jsonMatch) {
            cleanedText = jsonMatch[0];
          }

          return JSON.parse(cleanedText);
          
        } catch (err) {
          lastError = err;
          if (err.message && (err.message.includes("404:") || err.message.includes("503:") || err.message.includes("429:"))) {
            console.warn(`模型 ${model} 失敗，嘗試下一個...`);
            continue;
          }
          throw new Error("AI 回傳錯誤，請檢查您的金鑰或稍後再試。");
        }
      }

      throw new Error("目前 Google AI 伺服器全線繁忙或找不到支援的模型，請稍等幾分鐘後再試！");
    };

    // ==========================================
    // Reusable UI Components
    // ==========================================

    const Modal = ({ isOpen, icon: Icon, title, children, footer }) => {
      if (!isOpen) return null;
      return (
        <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-[clamp(1rem,4vw,2rem)] print:hidden animate-in fade-in duration-200">
          <div className="bg-white rounded-2xl shadow-2xl w-full max-w-[min(100%,28rem)] overflow-hidden transform transition-all scale-in duration-200">
            <div className="p-[clamp(1.25rem,4vw,2rem)]">
              <div className="flex items-center gap-3 text-emerald-600 mb-[clamp(0.75rem,2vw,1rem)]">
                <Icon className="h-[clamp(1.25rem,4vw,1.5rem)] w-[clamp(1.25rem,4vw,1.5rem)] shrink-0" />
                <h3 className="text-[clamp(1.125rem,3vw,1.25rem)] font-bold">{title}</h3>
              </div>
              <div className="text-[clamp(0.875rem,2vw,1rem)] text-slate-600 leading-relaxed mb-[clamp(1rem,3vw,1.5rem)]">
                {children}
              </div>
              {footer && <div className="flex flex-wrap gap-3 justify-end mt-[clamp(1rem,4vw,1.5rem)]">{footer}</div>}
            </div>
          </div>
        </div>
      );
    };

    const CharacterBox = memo(({ data, mode, gridStyle, onToggleCharHide, onToggleZhuyinHide }) => {
      const { id, char, zhuyin, isPunctuation, isHidden, isZhuyinHidden } = data;
      const shouldHideChar = mode === PracticeMode.WRITING && isHidden && !isPunctuation;
      const shouldHideZhuyin = mode === PracticeMode.WRITING && isZhuyinHidden && !isPunctuation;
      
      const toneChars = ['˙', 'ˊ', 'ˇ', 'ˋ'];
      const tone = zhuyin ? zhuyin.split('').find(c => toneChars.includes(c)) : '';
      const symbols = zhuyin ? zhuyin.split('').filter(c => !toneChars.includes(c)) : [];

      if (isPunctuation) {
        return (
          <div 
            className="group relative inline-flex items-start mx-1 mb-2 print:mb-4 print:mx-1 align-top"
            style={{ writingMode: 'horizontal-tb' }}
          >
            <div className="relative w-14 h-14 sm:w-16 sm:h-16 print:w-16 print:h-16 flex items-start justify-end pr-2 pt-2">
              <span className="text-[2rem] sm:text-[2.5rem] font-serif text-slate-800 leading-none">{char}</span>
            </div>
            <div className="relative h-14 sm:h-16 print:h-16 ml-1 w-6 sm:w-8"></div>
          </div>
        );
      }

      const renderGridLines = () => {
        if (gridStyle === GridStyle.NONE) return null;
        return (
          <svg className="absolute inset-0 w-full h-full pointer-events-none opacity-30 text-emerald-600" viewBox="0 0 100 100" preserveAspectRatio="none">
            <rect x="0" y="0" width="100" height="100" fill="none" stroke="currentColor" strokeWidth="2" />
            <line x1="50" y1="0" x2="50" y2="100" stroke="currentColor" strokeWidth="1" strokeDasharray="4 4" />
            <line x1="0" y1="50" x2="100" y2="50" stroke="currentColor" strokeWidth="1" strokeDasharray="4 4" />
            {gridStyle === GridStyle.MI && (
              <>
                <line x1="0" y1="0" x2="100" y2="100" stroke="currentColor" strokeWidth="1" strokeDasharray="4 4" />
                <line x1="100" y1="0" x2="0" y2="100" stroke="currentColor" strokeWidth="1" strokeDasharray="4 4" />
              </>
            )}
          </svg>
        );
      };

      return (
        <div 
          className={`group relative inline-flex items-start mx-1 mb-2 transition-transform hover:scale-105 print:hover:scale-100 print:mb-4 print:mx-1 align-top ${isHidden && mode === PracticeMode.WRITING ? 'opacity-90' : ''}`} 
          style={{ writingMode: 'horizontal-tb' }}
        >
          <div 
            className="relative w-14 h-14 sm:w-16 sm:h-16 print:w-16 print:h-16 bg-white border border-emerald-700 print:border-slate-800 font-zhuyin text-[2.5rem] text-slate-800 print:text-black shadow-sm print:shadow-none cursor-pointer hover:border-emerald-400 transition-colors" 
            onClick={() => onToggleCharHide(id)}
          >
            {renderGridLines()}
            {!shouldHideChar ? (
              <div className="absolute inset-0 flex items-center justify-center z-10">
                <span className="leading-none inline-block" style={{ lineHeight: '1' }}>{char}</span>
              </div>
            ) : (
              <div className="no-print absolute inset-0 bg-slate-100/50 flex items-center justify-center">
                <span className="text-slate-300 text-[1.5rem] font-sans leading-none inline-block" style={{ lineHeight: '1' }}>?</span>
              </div>
            )}
          </div>

          <div 
            className="relative h-14 sm:h-16 print:h-16 ml-1 w-6 sm:w-8 cursor-pointer hover:bg-slate-50 rounded print:hover:bg-transparent transition-colors flex items-center justify-center" 
            onClick={() => onToggleZhuyinHide(id)}
          >
            {!shouldHideZhuyin ? (
              <div className="relative flex flex-col items-center">
                 {symbols.map((s, idx) => (
                   <span key={idx} className="text-[0.875rem] sm:text-[1rem] font-zhuyin text-slate-700 print:text-black leading-none inline-block" style={{ lineHeight: '1' }}>{s}</span>
                 ))}
                 {tone === '˙' && (
                   <span className="absolute -top-[0.8em] left-1/2 transform -translate-x-1/2 text-[0.875rem] sm:text-[1rem] font-zhuyin text-slate-700 print:text-black leading-none inline-block" style={{ lineHeight: '1' }}>˙</span>
                 )}
                 {['ˊ', 'ˇ', 'ˋ'].includes(tone || '') && (
                   <span className="absolute top-1/2 -right-[0.8em] transform -translate-y-1/2 text-[0.875rem] sm:text-[1rem] font-zhuyin text-slate-700 print:text-black leading-none inline-block" style={{ lineHeight: '1' }}>{tone}</span>
                 )}
              </div>
            ) : (
              <div className="no-print absolute inset-0 bg-slate-100/50 rounded-sm border border-slate-200 border-dashed flex items-center justify-center">
                <span className="text-slate-300 text-[0.875rem] font-sans">?</span>
              </div>
            )}
          </div>
        </div>
      );
    });

    const WorksheetPreview = memo(({ article, mode, gridStyle, paperOrientation, onToggleCharHide, onToggleZhuyinHide }) => {
      const a4Height = paperOrientation === 'portrait' ? '277mm' : '189mm';

      return (
        <div className="w-full flex flex-col items-center">
          <style>{`
             @page { size: A4 ${paperOrientation}; margin: 10mm; }
          `}</style>
          <div 
            className={`bg-white shadow-xl print:shadow-none p-[clamp(1.5rem,4vw,2.5rem)] print:p-0 ${paperOrientation === 'landscape' ? 'max-w-[min(100%,80rem)]' : 'max-w-[min(100%,60rem)]'} w-full overflow-x-auto print:overflow-visible block`}
            style={{ writingMode: 'vertical-rl', textOrientation: 'upright', height: a4Height }}
          >
            <div className="border-l-2 border-emerald-800 mr-[clamp(0.5rem,2vw,1rem)] ml-[clamp(1rem,3vw,1.5rem)] pl-[clamp(1rem,3vw,1.5rem)] py-2 inline-flex justify-between align-top h-full">
              <h1 className="text-[clamp(1.5rem,4vw,2.25rem)] font-bold text-slate-900 tracking-widest leading-relaxed">
                {article.title || "語詞練習"}
              </h1>
              <div className="text-[clamp(1rem,2vw,1.125rem)] text-slate-700 print:text-black mt-10 leading-loose">
                姓名：　　　　
              </div>
            </div>

            <div className="inline-block align-top h-full content-start">
              {article.sentences.map((sentence) => (
                <span key={sentence.id} style={{ display: 'inline' }}>
                  {sentence.words.map((word) => (
                    <span key={word.id} style={{ display: 'inline' }}>
                       {word.characters.map((char) => (
                         <CharacterBox 
                            key={char.id} 
                            data={char} 
                            mode={mode} 
                            gridStyle={gridStyle}
                            onToggleCharHide={onToggleCharHide}
                            onToggleZhuyinHide={onToggleZhuyinHide}
                         />
                       ))}
                    </span>
                  ))}
                </span>
              ))}
            </div>
          </div>
          
          <div className="mt-[clamp(1rem,3vw,2rem)] pt-4 border-t border-slate-200 text-center text-[clamp(0.75rem,1.5vw,0.875rem)] text-slate-400 print:hidden w-full max-w-[min(100%,48rem)]" data-html2canvas-ignore="true">
            點擊方格或注音可分別切換顯示/隱藏。存成 PDF 時將自動隱藏此控制項。
          </div>
        </div>
      );
    });

    // ==========================================
    // Main App Component
    // ==========================================
    const App = () => {
      const [inputText, setInputText] = useState("");
      const [targetChars, setTargetChars] = useState('');
      const [lessonNumber, setLessonNumber] = useState('');
      const [lessonTitle, setLessonTitle] = useState('');
      const [author, setAuthor] = useState('');
      
      const [mode, setMode] = useState(PracticeMode.WRITING);
      const [gridStyle, setGridStyle] = useState(GridStyle.TIAN);
      const [paperOrientation, setPaperOrientation] = useState('portrait');
      const [autoHideKeywords, setAutoHideKeywords] = useState(true);
      const [useRandomCommonWord, setUseRandomCommonWord] = useState(false);

      const [isLoading, setIsLoading] = useState(false);
      const [articleData, setArticleData] = useState(null);
      const [errorMsg, setErrorMsg] = useState("");
      
      const [showPdfModal, setShowPdfModal] = useState(false);
      const [showPrintModal, setShowPrintModal] = useState(false);
      const [isDownloadingPdf, setIsDownloadingPdf] = useState(false);

      // 自訂 API Key 狀態 (具有自動記憶功能)
      const [userApiKey, setUserApiKey] = useState(() => localStorage.getItem('user_api_key') || '');

      const handleApiKeyChange = (e) => {
        const key = e.target.value;
        setUserApiKey(key);
        localStorage.setItem('user_api_key', key);
      };

      const handleGenerate = async () => {
        if (!userApiKey.trim()) return setErrorMsg("請先設定您的 Google Gemini API Key！");
        if (!inputText.trim() && !useRandomCommonWord) return setErrorMsg("請輸入課文內容！");
        if (!targetChars.trim()) return setErrorMsg("請輸入要練習的生字！");
        
        setIsLoading(true);
        setErrorMsg("");
        try {
          const data = await parseArticleWithGemini(inputText, targetChars, useRandomCommonWord, userApiKey.trim());
          const formattedLesson = lessonNumber.trim() ? `加能 國語第${lessonNumber.trim()}課` : '';
          const customTitleParts = [formattedLesson, lessonTitle.trim(), author.trim()].filter(Boolean);
          data.title = customTitleParts.length > 0 ? `${customTitleParts.join(' ')} 語詞練習` : '語詞練習';
          
          if (autoHideKeywords) {
             const targets = targetChars.replace(/[,，、\s]+/g, '').split('');
             data.sentences.forEach(s => {
               s.words.forEach(w => {
                 if (w.isTargetKeyword) {
                   w.characters.forEach(c => { if (targets.includes(c.char)) c.isHidden = true; });
                 }
               });
             });
          }
          setArticleData(data);
        } catch (error) {
          setErrorMsg(error.message);
        } finally {
          setIsLoading(false);
        }
      };

      const handleToggleCharHide = useCallback((charId) => {
        setArticleData(prev => {
          if (!prev) return prev;
          return {
            ...prev,
            sentences: prev.sentences.map(s => ({
              ...s,
              words: s.words.map(w => ({
                ...w,
                characters: w.characters.map(c => 
                  c.id === charId ? { ...c, isHidden: !c.isHidden } : c
                )
              }))
            }))
          };
        });
      }, []);

      const handleToggleZhuyinHide = useCallback((charId) => {
        setArticleData(prev => {
          if (!prev) return prev;
          return {
            ...prev,
            sentences: prev.sentences.map(s => ({
              ...s,
              words: s.words.map(w => ({
                ...w,
                characters: w.characters.map(c => 
                  c.id === charId ? { ...c, isZhuyinHidden: !c.isZhuyinHidden } : c
                )
              }))
            }))
          };
        });
      }, []);

      const resetVisibility = useCallback((target, hideAll) => {
        setArticleData(prev => {
          if (!prev) return prev;
          return {
            ...prev,
            sentences: prev.sentences.map(s => ({
              ...s,
              words: s.words.map(w => ({
                ...w,
                characters: w.characters.map(c => target === 'char' ? { ...c, isHidden: hideAll } : { ...c, isZhuyinHidden: hideAll })
              }))
            }))
          };
        });
      }, []);

      const handlePrint = () => {
        setShowPrintModal(true);
        setTimeout(() => { try { window.focus(); window.print(); } catch (e) {} }, 500);
      };

      const handleDownloadPDF = async () => {
        if (!articleData) return;
        setIsDownloadingPdf(true);
        try {
          const element = document.getElementById('worksheet-area');
          const [html2canvas, jspdfModule] = await Promise.all([
            loadScript('https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js', 'html2canvas'),
            loadScript('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js', 'jspdf')
          ]);
          const canvas = await html2canvas(element, { scale: 2, useCORS: true, backgroundColor: '#ffffff' });
          const imgData = canvas.toDataURL('image/jpeg', 1.0);
          const pdf = new jspdfModule.jsPDF({ orientation: paperOrientation, unit: 'mm', format: 'a4' });
          const pdfWidth = pdf.internal.pageSize.getWidth();
          const totalPdfHeight = canvas.height / (canvas.width / pdfWidth);
          pdf.addImage(imgData, 'JPEG', 0, 0, pdfWidth, totalPdfHeight);
          pdf.save(`${articleData.title || '語詞練習卷'}.pdf`);
          setShowPdfModal(false);
        } catch (error) {
          setErrorMsg("PDF 產生失敗。");
        } finally {
          setIsDownloadingPdf(false);
        }
      };

      return (
        <div className="min-h-screen flex flex-col bg-slate-50 text-slate-900 overflow-x-hidden">
          <nav className="bg-emerald-600 text-white shadow-md sticky top-0 print:hidden z-40">
            <div className="w-full max-w-[min(100%,80rem)] mx-auto px-[clamp(1rem,4vw,2rem)] min-h-[clamp(3.5rem,8vw,4rem)] flex flex-wrap items-center justify-between gap-y-2 py-2">
              <div className="flex items-center gap-[clamp(0.5rem,2vw,1rem)]">
                <BookOpen className="h-[clamp(1.25rem,4vw,1.5rem)] w-[clamp(1.25rem,4vw,1.5rem)]" />
                <span className="font-bold text-[clamp(1.125rem,3vw,1.25rem)] tracking-tight">加能國語語詞練習卷</span>
              </div>
              <div className="flex flex-wrap items-center gap-[clamp(0.5rem,2vw,1rem)]">
                <button onClick={handlePrint} disabled={!articleData} className="bg-white text-emerald-700 px-[clamp(0.75rem,2vw,1.25rem)] py-[clamp(0.5rem,1.5vw,0.75rem)] rounded-lg font-bold disabled:opacity-50 flex items-center gap-2 shadow-sm transition-all hover:bg-emerald-50 text-[clamp(0.875rem,2vw,1rem)]">
                  <Printer className="h-4 w-4 shrink-0" /> <span className="hidden sm:inline">存 PDF (推薦)</span>
                </button>
                <button onClick={() => setShowPdfModal(true)} disabled={!articleData} className="bg-white/10 px-[clamp(0.75rem,2vw,1.25rem)] py-[clamp(0.5rem,1.5vw,0.75rem)] rounded-lg disabled:opacity-50 flex items-center gap-2 hover:bg-white/20 transition-all text-[clamp(0.875rem,2vw,1rem)]">
                  <Download className="h-4 w-4 shrink-0" /> <span className="hidden sm:inline">下載圖檔</span>
                </button>
              </div>
            </div>
          </nav>

          <main className="flex-grow p-[clamp(1rem,4vw,2rem)] print:bg-white print:p-0 w-full max-w-[min(100%,80rem)] mx-auto">
            {errorMsg && (
              <div className="w-full max-w-[min(100%,56rem)] mx-auto mb-[clamp(1rem,3vw,1.5rem)] bg-red-50 border border-red-200 text-red-700 px-[clamp(1rem,3vw,1.5rem)] py-[clamp(0.75rem,2vw,1rem)] rounded-xl flex justify-between items-center print:hidden shadow-sm text-[clamp(0.875rem,2vw,1rem)]">
                <div className="flex items-center gap-2"><XCircle className="h-[clamp(1.25rem,3vw,1.5rem)] w-[clamp(1.25rem,3vw,1.5rem)] text-red-500 shrink-0" /><span>{errorMsg}</span></div>
                <button onClick={() => setErrorMsg("")} className="hover:text-red-900 transition-colors p-1">&times;</button>
              </div>
            )}

            {!articleData ? (
              <div className="w-full max-w-[min(100%,56rem)] mx-auto bg-white rounded-2xl shadow-xl p-[clamp(1.5rem,5vw,2.5rem)] print:hidden border border-slate-100 animate-in fade-in duration-500">
                <h2 className="text-[clamp(1.25rem,4vw,1.5rem)] font-bold text-slate-800 flex items-center gap-2 mb-[clamp(1.25rem,4vw,1.5rem)]"><FileText className="h-[clamp(1.25rem,4vw,1.5rem)] w-[clamp(1.25rem,4vw,1.5rem)] text-emerald-600 shrink-0"/>輸入內容</h2>
                
                <div className="flex flex-wrap gap-[clamp(1rem,3vw,1.5rem)] mb-[clamp(1rem,3vw,1.5rem)]">
                  <div className="flex-1 min-w-[min(100%,120px)]">
                    <label className="block text-[clamp(0.875rem,2vw,1rem)] font-bold text-slate-700 mb-2">課次</label>
                    <input type="text" className="w-full p-[clamp(0.75rem,2vw,1rem)] text-[clamp(0.875rem,2vw,1.125rem)] border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none transition-all shadow-sm" value={lessonNumber} onChange={(e) => setLessonNumber(e.target.value)} />
                  </div>
                  <div className="flex-[2] min-w-[min(100%,200px)]">
                    <label className="block text-[clamp(0.875rem,2vw,1rem)] font-bold text-slate-700 mb-2">課文名稱</label>
                    <input type="text" className="w-full p-[clamp(0.75rem,2vw,1rem)] text-[clamp(0.875rem,2vw,1.125rem)] border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none transition-all shadow-sm" value={lessonTitle} onChange={(e) => setLessonTitle(e.target.value)} />
                  </div>
                  <div className="flex-1 min-w-[min(100%,120px)]">
                    <label className="block text-[clamp(0.875rem,2vw,1rem)] font-bold text-slate-700 mb-2">作者</label>
                    <input type="text" className="w-full p-[clamp(0.75rem,2vw,1rem)] text-[clamp(0.875rem,2vw,1.125rem)] border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none transition-all shadow-sm" value={author} onChange={(e) => setAuthor(e.target.value)} />
                  </div>
                </div>

                <textarea className="w-full h-[clamp(10rem,25vh,14rem)] p-[clamp(0.75rem,2vw,1rem)] text-[clamp(1rem,2vw,1.125rem)] border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none resize-none mb-[clamp(1rem,3vw,1.5rem)] shadow-sm" placeholder="請在此貼上課文內容（若勾選隨機語詞則可不填）..." value={inputText} onChange={(e) => setInputText(e.target.value)} />
                
                <div className="mb-[clamp(1.25rem,4vw,1.5rem)] bg-slate-50 p-[clamp(1rem,3vw,1.5rem)] rounded-xl border border-slate-100">
                  <label className="block text-[clamp(0.875rem,2vw,1rem)] font-bold text-slate-700 mb-[clamp(0.5rem,2vw,0.75rem)]">請輸入生字 (可連續輸入，或以空格/逗號分隔)</label>
                  <input type="text" className="w-full p-[clamp(0.75rem,2vw,1rem)] text-[clamp(1rem,2vw,1.125rem)] border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none bg-white shadow-sm" placeholder="例如：春園蜜 (或 春, 園, 蜜)" value={targetChars} onChange={(e) => setTargetChars(e.target.value)} />
                  <div className="mt-[clamp(0.75rem,2vw,1rem)] flex flex-wrap items-center gap-[clamp(1rem,3vw,1.5rem)]">
                    <label className="flex items-center gap-2 cursor-pointer text-[clamp(0.875rem,2vw,1rem)] text-slate-600 hover:text-emerald-700 transition-colors font-medium">
                      <input type="checkbox" checked={useRandomCommonWord} onChange={e => setUseRandomCommonWord(e.target.checked)} className="w-[clamp(1rem,2vw,1.25rem)] h-[clamp(1rem,2vw,1.25rem)] text-emerald-600 rounded border-slate-300 focus:ring-emerald-500 shrink-0" />
                      自動生成語詞 (不勾則從原文抓取)
                    </label>
                    <label className="flex items-center gap-2 cursor-pointer text-[clamp(0.875rem,2vw,1rem)] text-slate-600 hover:text-emerald-700 transition-colors font-medium">
                      <input type="checkbox" checked={autoHideKeywords} onChange={e => setAutoHideKeywords(e.target.checked)} className="w-[clamp(1rem,2vw,1.25rem)] h-[clamp(1rem,2vw,1.25rem)] text-emerald-600 rounded border-slate-300 focus:ring-emerald-500 shrink-0" />
                      自動挖空生字
                    </label>
                  </div>
                </div>

                {/* API Key 必填設定區塊 */}
                <div className="mb-[clamp(1.25rem,4vw,1.5rem)] p-[clamp(1rem,3vw,1.5rem)] bg-emerald-50 border border-emerald-200 rounded-xl">
                  <label className="block text-[clamp(0.875rem,2vw,1rem)] font-bold text-emerald-800 mb-[clamp(0.5rem,2vw,0.75rem)]">設定 Google Gemini API Key (必填)</label>
                  <input 
                    type="password" 
                    value={userApiKey} 
                    onChange={handleApiKeyChange} 
                    placeholder="請輸入您的 API Key (AIzaSy...)" 
                    className="w-full p-[clamp(0.5rem,1.5vw,0.75rem)] text-[clamp(0.875rem,2vw,1rem)] border border-emerald-300 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none shadow-sm font-mono bg-white"
                  />
                  <p className="text-[clamp(0.75rem,1.5vw,0.875rem)] text-emerald-600 mt-2">
                    金鑰將安全地自動記憶於您的瀏覽器中。<a href="https://aistudio.google.com/app/apikey" target="_blank" rel="noopener noreferrer" className="underline font-bold hover:text-emerald-800">點此免費申請 API Key</a>
                  </p>
                </div>

                <button onClick={handleGenerate} disabled={isLoading} className="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-[clamp(0.875rem,3vw,1.25rem)] rounded-xl font-bold text-[clamp(1rem,3vw,1.125rem)] shadow-lg flex items-center justify-center gap-2 transition-all transform hover:-translate-y-0.5 active:translate-y-0 disabled:opacity-50 disabled:cursor-not-allowed disabled:transform-none">
                  {isLoading ? <><RefreshCw className="h-[clamp(1.25rem,3vw,1.5rem)] w-[clamp(1.25rem,3vw,1.5rem)] animate-spin shrink-0" /> 正在分析並標註注音...</> : <><Settings className="h-[clamp(1.25rem,3vw,1.5rem)] w-[clamp(1.25rem,3vw,1.5rem)] shrink-0" /> 產生語詞練習卷</>}
                </button>
              </div>
            ) : (
               <div className="w-full max-w-[min(100%,60rem)] mx-auto mb-[clamp(1rem,4vw,1.5rem)] print:hidden flex flex-wrap gap-[clamp(0.5rem,2vw,1rem)] items-center justify-between bg-white p-[clamp(0.75rem,2vw,1rem)] rounded-xl shadow-sm border border-slate-200 sticky top-[clamp(4.5rem,10vw,5.5rem)] z-30">
                  <div className="flex flex-wrap gap-[clamp(0.25rem,1.5vw,0.5rem)] items-center">
                     <button onClick={() => setArticleData(null)} className="flex items-center gap-1 text-slate-600 hover:text-emerald-700 px-[clamp(0.5rem,1.5vw,0.75rem)] py-1.5 rounded-lg text-[clamp(0.75rem,1.5vw,0.875rem)] font-medium transition-colors hover:bg-emerald-50"><Edit3 className="h-4 w-4 shrink-0"/> <span className="hidden sm:inline">重新編輯</span></button>
                     
                     <div className="w-px h-6 bg-slate-200 mx-1 hidden sm:block"></div>
                     <div className="flex gap-1 bg-slate-100 p-1 rounded-lg">
                        <button onClick={() => setPaperOrientation('portrait')} className={`px-[clamp(0.5rem,2vw,0.75rem)] py-1 text-[clamp(0.75rem,1.5vw,0.875rem)] rounded-md transition-all ${paperOrientation === 'portrait' ? 'bg-white shadow text-emerald-600 font-bold' : 'text-slate-600 hover:text-emerald-600'}`}>A4直印</button>
                        <button onClick={() => setPaperOrientation('landscape')} className={`px-[clamp(0.5rem,2vw,0.75rem)] py-1 text-[clamp(0.75rem,1.5vw,0.875rem)] rounded-md transition-all ${paperOrientation === 'landscape' ? 'bg-white shadow text-emerald-600 font-bold' : 'text-slate-600 hover:text-emerald-600'}`}>A4橫印</button>
                     </div>
                     
                     <div className="w-px h-6 bg-slate-200 mx-1 hidden md:block"></div>
                     <div className="flex items-center bg-slate-50 border border-slate-200 rounded-lg p-1">
                        <span className="text-[clamp(0.65rem,1.5vw,0.75rem)] font-bold text-slate-500 px-2 hidden sm:inline">方格</span>
                        <button onClick={() => setGridStyle(GridStyle.NONE)} className={`px-[clamp(0.5rem,1.5vw,0.75rem)] py-1 text-[clamp(0.75rem,1.5vw,0.875rem)] font-medium rounded transition-all ${gridStyle === GridStyle.NONE ? 'bg-white shadow text-emerald-600 font-bold' : 'text-slate-600 hover:text-emerald-600'}`}>空白</button>
                        <button onClick={() => setGridStyle(GridStyle.TIAN)} className={`px-[clamp(0.5rem,1.5vw,0.75rem)] py-1 text-[clamp(0.75rem,1.5vw,0.875rem)] font-medium rounded transition-all ${gridStyle === GridStyle.TIAN ? 'bg-white shadow text-emerald-600 font-bold' : 'text-slate-600 hover:text-emerald-600'}`}>十字</button>
                        <button onClick={() => setGridStyle(GridStyle.MI)} className={`px-[clamp(0.5rem,1.5vw,0.75rem)] py-1 text-[clamp(0.75rem,1.5vw,0.875rem)] font-medium rounded transition-all ${gridStyle === GridStyle.MI ? 'bg-white shadow text-emerald-600 font-bold' : 'text-slate-600 hover:text-emerald-600'}`}>米字</button>
                     </div>

                     <div className="w-px h-6 bg-slate-200 mx-1 hidden xl:block"></div>
                     <div className="flex gap-1 bg-slate-100 p-1 rounded-lg">
                        <button onClick={() => setMode(PracticeMode.READING)} className={`px-[clamp(0.5rem,2vw,0.75rem)] py-1 text-[clamp(0.75rem,1.5vw,0.875rem)] rounded-md transition-all ${mode === PracticeMode.READING ? 'bg-white shadow text-emerald-600 font-bold' : 'text-slate-600 hover:text-emerald-600'}`}>閱讀</button>
                        <button onClick={() => setMode(PracticeMode.WRITING)} className={`px-[clamp(0.5rem,2vw,0.75rem)] py-1 text-[clamp(0.75rem,1.5vw,0.875rem)] rounded-md transition-all ${mode === PracticeMode.WRITING ? 'bg-white shadow text-emerald-600 font-bold' : 'text-slate-600 hover:text-emerald-600'}`}>寫字</button>
                     </div>
                  </div>

                  <div className="flex flex-wrap gap-[clamp(0.25rem,1.5vw,0.5rem)]">
                    <div className="flex items-center bg-slate-50 border border-slate-200 rounded-lg p-1">
                       <span className="text-[clamp(0.65rem,1.5vw,0.75rem)] font-bold text-slate-500 px-2 border-r mr-1">國字</span>
                       <button onClick={() => resetVisibility('char', true)} className="px-[clamp(0.25rem,1.5vw,0.5rem)] py-1 text-[clamp(0.75rem,1.5vw,0.875rem)] hover:text-red-600 font-medium hover:bg-red-50 rounded transition-colors">挖空</button>
                       <button onClick={() => resetVisibility('char', false)} className="px-[clamp(0.25rem,1.5vw,0.5rem)] py-1 text-[clamp(0.75rem,1.5vw,0.875rem)] hover:text-blue-600 font-medium hover:bg-blue-50 rounded transition-colors">顯示</button>
                    </div>
                    <div className="flex items-center bg-slate-50 border border-slate-200 rounded-lg p-1">
                       <span className="text-[clamp(0.65rem,1.5vw,0.75rem)] font-bold text-slate-500 px-2 border-r mr-1">注音</span>
                       <button onClick={() => resetVisibility('zhuyin', true)} className="px-[clamp(0.25rem,1.5vw,0.5rem)] py-1 text-[clamp(0.75rem,1.5vw,0.875rem)] hover:text-red-600 font-medium hover:bg-red-50 rounded transition-colors">挖空</button>
                       <button onClick={() => resetVisibility('zhuyin', false)} className="px-[clamp(0.25rem,1.5vw,0.5rem)] py-1 text-[clamp(0.75rem,1.5vw,0.875rem)] hover:text-blue-600 font-medium hover:bg-blue-50 rounded transition-colors">顯示</button>
                    </div>
                  </div>
               </div>
            )}

            {articleData && (
              <div id="worksheet-area" className="bg-slate-100 print:bg-white print:rounded-none rounded-xl overflow-hidden print:overflow-visible shadow-inner print:shadow-none transition-all duration-500 w-full max-w-[min(100%,80rem)] mx-auto flex justify-center">
                <WorksheetPreview 
                  article={articleData} 
                  mode={mode} 
                  gridStyle={gridStyle} 
                  paperOrientation={paperOrientation} 
                  onToggleCharHide={handleToggleCharHide} 
                  onToggleZhuyinHide={handleToggleZhuyinHide} 
                />
              </div>
            )}
            
            {isLoading && (
              <div className="fixed inset-0 bg-white/80 backdrop-blur-sm z-50 flex flex-col items-center justify-center p-4">
                <div className="w-[clamp(3rem,8vw,4rem)] h-[clamp(3rem,8vw,4rem)] border-4 border-t-emerald-600 border-emerald-100 rounded-full animate-spin mb-[clamp(1rem,4vw,1.5rem)]"></div>
                <p className="text-[clamp(1.25rem,4vw,1.5rem)] font-bold text-emerald-800 animate-pulse text-center">正在為您產生練習卷...</p>
                <p className="text-slate-500 mt-2 text-[clamp(0.75rem,2vw,0.875rem)] text-center">這可能需要 10-20 秒，請勿重新整理頁面</p>
              </div>
            )}

            <Modal isOpen={showPdfModal} icon={Info} title="建議使用系統功能存為 PDF" footer={<><button onClick={() => setShowPdfModal(false)} className="px-[clamp(0.75rem,2vw,1rem)] py-[clamp(0.5rem,1.5vw,0.75rem)] bg-slate-100 text-slate-700 font-medium rounded-lg hover:bg-slate-200 transition-colors text-[clamp(0.875rem,2vw,1rem)]">返回</button><button onClick={handleDownloadPDF} disabled={isDownloadingPdf} className="px-[clamp(0.75rem,2vw,1rem)] py-[clamp(0.5rem,1.5vw,0.75rem)] text-slate-400 font-medium hover:text-slate-600 transition-colors text-[clamp(0.875rem,2vw,1rem)]">{isDownloadingPdf ? '處理中...' : '強制下載圖檔'}</button></>}>
              因為您使用了<strong>直式排版</strong>，傳統的截圖下載方式容易發生文字切斷的問題。<br/><br/>點擊上方白色的 <strong className="text-emerald-700">「存 PDF (推薦)」</strong> 按鈕，並在視窗中選擇 <strong>「另存為 PDF」</strong>，這樣存出來的格式會最完美！
            </Modal>

            <Modal isOpen={showPrintModal} icon={Printer} title="準備儲存 PDF..." footer={<button onClick={() => setShowPrintModal(false)} className="px-[clamp(0.75rem,2vw,1rem)] py-[clamp(0.5rem,1.5vw,0.75rem)] bg-emerald-600 text-white font-medium rounded-lg hover:bg-emerald-700 transition-all shadow-md text-[clamp(0.875rem,2vw,1rem)]">我知道了</button>}>
              正在開啟列印對話框...<br/><br/>
              <strong className="text-red-500">⚠️ 注意：</strong> 請將目的地更改為 <strong>「另存為 PDF」</strong>。<br/><br/>
              若沒跳出視窗請按快捷鍵：<br/>
              <span className="inline-block bg-slate-100 px-3 py-1 rounded-lg text-slate-800 font-mono mt-3 mb-2 border border-slate-200 break-all text-[clamp(0.75rem,2vw,0.875rem)]">Windows: Ctrl + P / Mac: Cmd + P</span>
            </Modal>
          </main>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
