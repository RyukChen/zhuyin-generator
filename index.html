<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>加能國字注音生成器</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useCallback, memo } = window.React;

    // ==========================================
    // 圖示組件 (改為內建 SVG，避免外部 CDN 載入失敗導致白畫面)
    // ==========================================
    const Icon = ({ children, className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        {children}
      </svg>
    );
    const BookOpen = ({ className }) => <Icon className={className}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></Icon>;
    const Printer = ({ className }) => <Icon className={className}><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect width="12" height="8" x="6" y="14"/></Icon>;
    const RefreshCw = ({ className }) => <Icon className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></Icon>;
    const Settings = ({ className }) => <Icon className={className}><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></Icon>;
    const Edit3 = ({ className }) => <Icon className={className}><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></Icon>;
    const FileText = ({ className }) => <Icon className={className}><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/></Icon>;
    const XCircle = ({ className }) => <Icon className={className}><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></Icon>;
    const Download = ({ className }) => <Icon className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></Icon>;
    const Info = ({ className }) => <Icon className={className}><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></Icon>;

    // ==========================================
    // Types & Enums
    // ==========================================
    const PracticeMode = {
      READING: 'reading',
      WRITING: 'writing'
    };

    const GridStyle = {
      TIAN: 'tian',
      MI: 'mi',
      NONE: 'none'
    };

    // ==========================================
    // Utilities & API Services
    // ==========================================
    const loadScript = (src, globalName) => {
      return new Promise((resolve, reject) => {
        if (window[globalName]) return resolve(window[globalName]);
        const script = document.createElement('script');
        script.src = src;
        script.crossOrigin = 'anonymous';
        script.onload = () => resolve(window[globalName]);
        script.onerror = () => reject(new Error(`Failed to load ${src}`));
        document.head.appendChild(script);
      });
    };

    const apiKey = "AIzaSyCcVB-QPLBxvtV0skCj2kzppsQ5Z9ASnWw"; 

    async function fetchWithBackoff(url, options, maxRetries = 5) {
      const delays = [1000, 2000, 4000, 8000, 16000];
      for (let i = 0; i < maxRetries; i++) {
        try {
          const response = await fetch(url, options);
          if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
          return await response.json();
        } catch (error) {
          if (i === maxRetries - 1) throw error;
          await new Promise(res => setTimeout(res, delays[i]));
        }
      }
    }

    const parseArticleWithGemini = async (text, targetChars, useRandomCommonWord) => {
      const ruleSpecifics = useRandomCommonWord
        ? `1. For EACH target character provided by the user, generate EXACTLY ONE random common word (常用語詞) suitable for elementary students that contains it. Do NOT use the word from the text.
           2. The output MUST contain only ONE word per target character.
           3. Format: "[CommonWord]。" (Example for character "春": "青春。")`
        : `1. For EACH target character provided by the user, find EXACTLY ONE word (語詞) in the text that contains it.
           2. The output MUST contain only ONE word per target character.
           3. Format: "[TextWord]。" (Example for character "春": "春天。")`;

      const systemInstruction = `
      You are an expert Elementary School Chinese Teacher in Taiwan.
      Your task is to create a vocabulary practice worksheet based on a text and a list of target characters (生字).
      Rules:
      ${ruleSpecifics}
      4. Segment this sentence into words and characters matching the required JSON schema.
      5. Set isTargetKeyword=true for the practice word.
      6. Provide correct Taiwan Traditional Chinese Zhuyin for all characters.
      7. Treat punctuation as separate words with isPunctuation=true.
      8. Return STRICT JSON.
      `;

      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
      const payload = {
        contents: [{ parts: [{ text: `【課文內容】\n${text}\n\n【指定生字】\n${targetChars}` }] }],
        systemInstruction: { parts: [{ text: systemInstruction }] },
        generationConfig: {
          responseMimeType: "application/json",
          responseSchema: {
            type: "OBJECT",
            properties: {
              title: { type: "STRING" },
              sentences: {
                type: "ARRAY",
                items: {
                  type: "OBJECT",
                  properties: {
                    id: { type: "STRING" },
                    words: {
                      type: "ARRAY",
                      items: {
                        type: "OBJECT",
                        properties: {
                          id: { type: "STRING" },
                          isTargetKeyword: { type: "BOOLEAN" },
                          characters: {
                            type: "ARRAY",
                            items: {
                              type: "OBJECT",
                              properties: {
                                id: { type: "STRING" },
                                char: { type: "STRING" },
                                zhuyin: { type: "STRING" },
                                isPunctuation: { type: "BOOLEAN" },
                                isHidden: { type: "BOOLEAN" },
                                isZhuyinHidden: { type: "BOOLEAN" }
                              },
                              required: ["char", "zhuyin", "id"]
                            }
                          }
                        },
                        required: ["characters", "id"]
                      }
                    }
                  },
                  required: ["words", "id"]
                }
              }
            },
            required: ["sentences", "title"]
          }
        }
      };

      const result = await fetchWithBackoff(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
      const responseText = result.candidates?.[0]?.content?.parts?.[0]?.text;
      if (!responseText) throw new Error("No response from Gemini");
      return JSON.parse(responseText);
    };

    // ==========================================
    // Reusable UI Components
    // ==========================================
    const Modal = ({ isOpen, icon: IconComponent, title, children, footer }) => {
      if (!isOpen) return null;
      return (
        <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4 print:hidden animate-in fade-in duration-200">
          <div className="bg-white rounded-2xl shadow-2xl max-w-md w-full overflow-hidden transform transition-all scale-in duration-200">
            <div className="p-6">
              <div className="flex items-center gap-3 text-emerald-600 mb-4">
                <IconComponent className="h-6 w-6" />
                <h3 className="text-xl font-bold">{title}</h3>
              </div>
              <div className="text-slate-600 leading-relaxed mb-4">
                {children}
              </div>
              {footer && <div className="flex gap-3 justify-end mt-6">{footer}</div>}
            </div>
          </div>
        </div>
      );
    };

    const CharacterBox = memo(({ data, mode, gridStyle, onToggleCharHide, onToggleZhuyinHide }) => {
      const { id, char, zhuyin, isPunctuation, isHidden, isZhuyinHidden } = data;
      const shouldHideChar = mode === PracticeMode.WRITING && isHidden && !isPunctuation;
      const shouldHideZhuyin = mode === PracticeMode.WRITING && isZhuyinHidden && !isPunctuation;
      
      const toneChars = ['˙', 'ˊ', 'ˇ', 'ˋ'];
      const tone = zhuyin ? zhuyin.split('').find(c => toneChars.includes(c)) : '';
      const symbols = zhuyin ? zhuyin.split('').filter(c => !toneChars.includes(c)) : [];

      if (isPunctuation) {
        return (
          <div className="group relative inline-flex items-start mx-1 mb-2 print:mb-4 print:mx-1 align-top" style={{ writingMode: 'horizontal-tb' }}>
            <div className="relative w-14 h-14 sm:w-16 sm:h-16 print:w-16 print:h-16 flex items-start justify-end pr-2 pt-2">
              <span className="text-3xl sm:text-4xl font-serif text-slate-800 leading-none">{char}</span>
            </div>
            <div className="relative h-14 sm:h-16 print:h-16 ml-1 w-6 sm:w-8"></div>
          </div>
        );
      }

      const renderGridLines = () => {
        if (gridStyle === GridStyle.NONE) return null;
        return (
          <svg className="absolute inset-0 w-full h-full pointer-events-none opacity-30 text-emerald-600" viewBox="0 0 100 100" preserveAspectRatio="none">
            <rect x="0" y="0" width="100" height="100" fill="none" stroke="currentColor" strokeWidth="2" />
            <line x1="50" y1="0" x2="50" y2="100" stroke="currentColor" strokeWidth="1" strokeDasharray="4 4" />
            <line x1="0" y1="50" x2="100" y2="50" stroke="currentColor" strokeWidth="1" strokeDasharray="4 4" />
            {gridStyle === GridStyle.MI && (
              <React.Fragment>
                <line x1="0" y1="0" x2="100" y2="100" stroke="currentColor" strokeWidth="1" strokeDasharray="4 4" />
                <line x1="100" y1="0" x2="0" y2="100" stroke="currentColor" strokeWidth="1" strokeDasharray="4 4" />
              </React.Fragment>
            )}
          </svg>
        );
      };

      return (
        <div className={`group relative inline-flex items-start mx-1 mb-2 transition-transform hover:scale-105 print:hover:scale-100 print:mb-4 print:mx-1 align-top ${isHidden && mode === PracticeMode.WRITING ? 'opacity-90' : ''}`} style={{ writingMode: 'horizontal-tb' }}>
          <div className="relative w-14 h-14 sm:w-16 sm:h-16 print:w-16 print:h-16 bg-white border border-emerald-700 print:border-slate-800 font-zhuyin text-4xl sm:text-4xl text-slate-800 print:text-black shadow-sm print:shadow-none cursor-pointer hover:border-emerald-400 transition-colors" onClick={() => onToggleCharHide(id)}>
            {renderGridLines()}
            {!shouldHideChar ? (
              <div className="absolute inset-0 flex items-center justify-center z-10">
                <span className="leading-none inline-block" style={{ lineHeight: '1' }}>{char}</span>
              </div>
            ) : (
              <div className="no-print absolute inset-0 bg-slate-100/50 flex items-center justify-center">
                <span className="text-slate-300 text-2xl font-sans leading-none inline-block" style={{ lineHeight: '1' }}>?</span>
              </div>
            )}
          </div>

          <div className="relative h-14 sm:h-16 print:h-16 ml-1 w-6 sm:w-8 cursor-pointer hover:bg-slate-50 rounded print:hover:bg-transparent transition-colors flex items-center justify-center" onClick={() => onToggleZhuyinHide(id)}>
            {!shouldHideZhuyin ? (
              <div className="relative flex flex-col items-center">
                 {symbols.map((s, idx) => (
                   <span key={idx} className="text-sm sm:text-base font-zhuyin text-slate-700 print:text-black leading-none inline-block" style={{ lineHeight: '1' }}>{s}</span>
                 ))}
                 {tone === '˙' && (
                   <span className="absolute -top-[0.8em] left-1/2 transform -translate-x-1/2 text-sm sm:text-base font-zhuyin text-slate-700 print:text-black leading-none inline-block" style={{ lineHeight: '1' }}>˙</span>
                 )}
                 {['ˊ', 'ˇ', 'ˋ'].includes(tone || '') && (
                   <span className="absolute top-1/2 -right-[0.8em] transform -translate-y-1/2 text-sm sm:text-base font-zhuyin text-slate-700 print:text-black leading-none inline-block" style={{ lineHeight: '1' }}>{tone}</span>
                 )}
              </div>
            ) : (
              <div className="no-print absolute inset-0 bg-slate-100/50 rounded-sm border border-slate-200 border-dashed flex items-center justify-center">
                <span className="text-slate-300 text-sm font-sans">?</span>
              </div>
            )}
          </div>
        </div>
      );
    });

    const WorksheetPreview = ({ article, mode, gridStyle, paperOrientation, onUpdateCharacter }) => {
      const findCharacterState = useCallback((id, prop) => {
        for (const sent of article.sentences) {
          for (const word of sent.words) {
            const char = word.characters.find(c => c.id === id);
            if (char) return !!char[prop];
          }
        }
        return false;
      }, [article]);

      const handleToggleCharHide = useCallback((id) => onUpdateCharacter(id, { isHidden: !findCharacterState(id, 'isHidden') }), [findCharacterState, onUpdateCharacter]);
      const handleToggleZhuyinHide = useCallback((id) => onUpdateCharacter(id, { isZhuyinHidden: !findCharacterState(id, 'isZhuyinHidden') }), [findCharacterState, onUpdateCharacter]);

      const a4Height = paperOrientation === 'portrait' ? '277mm' : '189mm';

      return (
        <div className="w-full flex flex-col items-center">
          <div 
            className={`bg-white shadow-xl print:shadow-none p-6 sm:p-10 print:p-0 ${paperOrientation === 'landscape' ? 'max-w-7xl' : 'max-w-5xl'} w-full overflow-x-auto print:overflow-visible block`}
            style={{ writingMode: 'vertical-rl', textOrientation: 'upright', height: a4Height }}
          >
            <div className="border-l-2 border-emerald-800 mr-2 sm:mr-4 ml-4 sm:ml-6 pl-4 sm:pl-6 py-2 inline-flex justify-between align-top h-full">
              <h1 className="text-2xl sm:text-3xl font-bold text-slate-900 tracking-widest leading-relaxed">
                {article.title || "語詞練習"}
              </h1>
              <div className="text-base sm:text-lg text-slate-700 print:text-black mt-10 leading-loose">
                姓名：　　　　
              </div>
            </div>

            <div className="inline-block align-top h-full content-start">
              {article.sentences.map((sentence) => (
                <span key={sentence.id} style={{ display: 'inline' }}>
                  {sentence.words.map((word) => (
                    <span key={word.id} style={{ display: 'inline' }}>
                       {word.characters.map((char) => (
                         <CharacterBox 
                            key={char.id} 
                            data={char} 
                            mode={mode} 
                            gridStyle={gridStyle}
                            onToggleCharHide={handleToggleCharHide}
                            onToggleZhuyinHide={handleToggleZhuyinHide}
                         />
                       ))}
                    </span>
                  ))}
                </span>
              ))}
            </div>
          </div>
          
          <div className="mt-8 pt-4 border-t border-slate-200 text-center text-slate-400 text-xs print:hidden w-full max-w-3xl" data-html2canvas-ignore="true">
            點擊方格或注音可分別切換顯示/隱藏。存成 PDF 時將自動隱藏此控制項。
          </div>
        </div>
      );
    };

    // ==========================================
    // Main App Component
    // ==========================================
    const App = () => {
      const [inputText, setInputText] = useState("");
      const [targetChars, setTargetChars] = useState('');
      const [lessonNumber, setLessonNumber] = useState('');
      const [lessonTitle, setLessonTitle] = useState('');
      const [author, setAuthor] = useState('');
      
      const [mode, setMode] = useState(PracticeMode.WRITING);
      const [gridStyle, setGridStyle] = useState(GridStyle.TIAN);
      const [paperOrientation, setPaperOrientation] = useState('portrait');
      const [autoHideKeywords, setAutoHideKeywords] = useState(true);
      const [useRandomCommonWord, setUseRandomCommonWord] = useState(false);

      const [isLoading, setIsLoading] = useState(false);
      const [articleData, setArticleData] = useState(null);
      const [errorMsg, setErrorMsg] = useState("");
      
      const [showPdfModal, setShowPdfModal] = useState(false);
      const [showPrintModal, setShowPrintModal] = useState(false);
      const [isDownloadingPdf, setIsDownloadingPdf] = useState(false);

      const handleGenerate = async () => {
        if (!inputText.trim()) return setErrorMsg("請輸入課文內容！");
        if (!targetChars.trim()) return setErrorMsg("請輸入要擷取的生字！");
        
        setIsLoading(true);
        setErrorMsg("");
        try {
          const data = await parseArticleWithGemini(inputText, targetChars, useRandomCommonWord);
          const formattedLesson = lessonNumber.trim() ? `加能 國語第${lessonNumber.trim()}課` : '';
          const customTitleParts = [formattedLesson, lessonTitle.trim(), author.trim()].filter(Boolean);
          data.title = customTitleParts.length > 0 ? `${customTitleParts.join(' ')} 語詞練習` : '語詞練習';
          
          if (autoHideKeywords) {
             const targets = targetChars.replace(/[,，、\s]+/g, '').split('');
             data.sentences.forEach(s => {
               s.words.forEach(w => {
                 if (w.isTargetKeyword) {
                   w.characters.forEach(c => { if (targets.includes(c.char)) c.isHidden = true; });
                 }
               });
             });
          }
          setArticleData(data);
        } catch (error) {
          setErrorMsg("生成失敗，請稍後重試。");
        } finally {
          setIsLoading(false);
        }
      };

      const handleUpdateCharacter = useCallback((charId, updates) => {
        setArticleData(prev => {
          if (!prev) return prev;
          return {
            ...prev,
            sentences: prev.sentences.map(s => ({
              ...s,
              words: s.words.map(w => {
                if (!w.characters.some(c => c.id === charId)) return w;
                return { ...w, characters: w.characters.map(c => c.id === charId ? { ...c, ...updates } : c) };
              })
            }))
          };
        });
      }, []);

      const resetVisibility = useCallback((target, hideAll) => {
        setArticleData(prev => {
          if (!prev) return prev;
          return {
            ...prev,
            sentences: prev.sentences.map(s => ({
              ...s,
              words: s.words.map(w => ({
                ...w,
                characters: w.characters.map(c => target === 'char' ? { ...c, isHidden: hideAll } : { ...c, isZhuyinHidden: hideAll })
              }))
            }))
          };
        });
      }, []);

      const handlePrint = () => {
        setShowPrintModal(true);
        setTimeout(() => { try { window.focus(); window.print(); } catch (e) {} }, 500);
      };

      const handleDownloadPDF = async () => {
        if (!articleData) return;
        setIsDownloadingPdf(true);
        try {
          const element = document.getElementById('worksheet-area');
          const [html2canvas, jspdfModule] = await Promise.all([
            loadScript('https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js', 'html2canvas'),
            loadScript('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js', 'jspdf')
          ]);
          const canvas = await html2canvas(element, { scale: 2, useCORS: true, backgroundColor: '#ffffff' });
          const imgData = canvas.toDataURL('image/jpeg', 1.0);
          const pdf = new jspdfModule.jsPDF({ orientation: paperOrientation, unit: 'mm', format: 'a4' });
          const pdfWidth = pdf.internal.pageSize.getWidth();
          const totalPdfHeight = canvas.height / (canvas.width / pdfWidth);
          pdf.addImage(imgData, 'JPEG', 0, 0, pdfWidth, totalPdfHeight);
          pdf.save(`${articleData.title || '語詞練習卷'}.pdf`);
          setShowPdfModal(false);
        } catch (error) {
          setErrorMsg("PDF 產生失敗。");
        } finally {
          setIsDownloadingPdf(false);
        }
      };

      return (
        <React.Fragment>
          <style>{`
            @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
            body { font-family: 'Noto Sans TC', sans-serif; }
            .font-zhuyin { font-family: 'BiauKai', 'DFKai-SB', 'KaiTi', serif; }
            @media print {
              .no-print { display: none !important; }
              body { background: white; margin: 0; padding: 0; }
              @page { size: A4 ${paperOrientation}; margin: 10mm; }
              * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            }
          `}</style>

          <div className="min-h-screen flex flex-col bg-slate-50 text-slate-900">
            <nav className="bg-emerald-600 text-white shadow-md sticky top-0 print:hidden z-40">
              <div className="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
                <div className="flex items-center gap-2">
                  <BookOpen className="h-6 w-6" />
                  <span className="font-bold text-xl tracking-tight">加能國字注音生成器</span>
                </div>
                <div className="flex items-center gap-2">
                  <button onClick={handlePrint} disabled={!articleData} className="bg-white text-emerald-700 px-4 py-2 rounded-lg font-bold disabled:opacity-50 flex items-center gap-2 shadow-sm transition-all hover:bg-emerald-50">
                    <Printer className="h-4 w-4" /> 存 PDF (推薦)
                  </button>
                  <button onClick={() => setShowPdfModal(true)} disabled={!articleData} className="bg-white/10 px-4 py-2 rounded-lg disabled:opacity-50 flex items-center gap-2 hover:bg-white/20 transition-all">
                    <Download className="h-4 w-4" /> 下載圖檔 PDF
                  </button>
                </div>
              </div>
            </nav>

            <main className="flex-grow p-4 sm:p-6 print:bg-white print:p-0">
              {errorMsg && (
                <div className="max-w-4xl mx-auto mb-4 bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-xl flex justify-between items-center print:hidden shadow-sm">
                  <div className="flex items-center gap-2"><XCircle className="h-5 w-5 text-red-500" /><span>{errorMsg}</span></div>
                  <button onClick={() => setErrorMsg("")} className="hover:text-red-900 transition-colors">&times;</button>
                </div>
              )}

              {!articleData ? (
                <div className="max-w-4xl mx-auto bg-white rounded-2xl shadow-xl p-6 sm:p-8 print:hidden border border-slate-100 animate-in fade-in duration-500">
                  <h2 className="text-xl font-bold text-slate-800 flex items-center gap-2 mb-6"><FileText className="h-5 w-5 text-emerald-600"/>輸入課文內容</h2>
                  
                  <div className="grid grid-cols-1 sm:grid-cols-4 gap-4 mb-4">
                    <div className="sm:col-span-1">
                      <label className="block text-sm font-bold text-slate-700 mb-2">課次 (僅填數字)</label>
                      <input type="text" className="w-full p-4 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none transition-all shadow-sm" value={lessonNumber} onChange={(e) => setLessonNumber(e.target.value)} />
                    </div>
                    <div className="sm:col-span-2">
                      <label className="block text-sm font-bold text-slate-700 mb-2">課文名稱</label>
                      <input type="text" className="w-full p-4 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none transition-all shadow-sm" value={lessonTitle} onChange={(e) => setLessonTitle(e.target.value)} />
                    </div>
                    <div className="sm:col-span-1">
                      <label className="block text-sm font-bold text-slate-700 mb-2">作者</label>
                      <input type="text" className="w-full p-4 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none transition-all shadow-sm" value={author} onChange={(e) => setAuthor(e.target.value)} />
                    </div>
                  </div>

                  <textarea className="w-full h-48 p-4 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none resize-none text-lg mb-4 shadow-sm" placeholder="請在此貼上課文內容..." value={inputText} onChange={(e) => setInputText(e.target.value)} />
                  
                  <div className="mb-6 bg-slate-50 p-6 rounded-xl border border-slate-100">
                    <label className="block text-sm font-bold text-slate-700 mb-3">請輸入要練習的生字 (以逗號分隔)</label>
                    <input type="text" className="w-full p-4 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none text-lg bg-white" placeholder="例如：春, 園, 蜜" value={targetChars} onChange={(e) => setTargetChars(e.target.value)} />
                    <div className="mt-4 flex flex-wrap items-center gap-6">
                      <label className="flex items-center gap-2 cursor-pointer text-sm text-slate-600 hover:text-emerald-700 transition-colors font-medium">
                        <input type="checkbox" checked={useRandomCommonWord} onChange={e => setUseRandomCommonWord(e.target.checked)} className="w-4 h-4 text-emerald-600 rounded border-slate-300 focus:ring-emerald-500" />
                        替換為隨機常用語詞 (不勾則用原課文)
                      </label>
                      <label className="flex items-center gap-2 cursor-pointer text-sm text-slate-600 hover:text-emerald-700 transition-colors font-medium">
                        <input type="checkbox" checked={autoHideKeywords} onChange={e => setAutoHideKeywords(e.target.checked)} className="w-4 h-4 text-emerald-600 rounded border-slate-300 focus:ring-emerald-500" />
                        自動挖空生字
                      </label>
                    </div>
                  </div>

                  <button onClick={handleGenerate} disabled={isLoading || !inputText.trim()} className="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-4 rounded-xl font-bold text-lg shadow-lg flex items-center justify-center gap-2 transition-all transform hover:-translate-y-0.5 active:translate-y-0 disabled:opacity-50 disabled:cursor-not-allowed">
                    {isLoading ? <React.Fragment><RefreshCw className="h-5 w-5 animate-spin" /> 分析中...</React.Fragment> : <React.Fragment><Settings className="h-5 w-5" /> 產生練習卷</React.Fragment>}
                  </button>
                </div>
              ) : (
                 <div className="max-w-5xl mx-auto mb-6 print:hidden flex flex-wrap gap-4 items-center justify-between bg-white p-4 rounded-xl shadow-sm border border-slate-200 sticky top-20 z-30">
                    <div className="flex flex-wrap gap-2 items-center">
                       <button onClick={() => setArticleData(null)} className="flex items-center gap-1 text-slate-600 hover:text-emerald-700 px-3 py-1.5 rounded-lg text-sm font-medium transition-colors hover:bg-emerald-50"><Edit3 className="h-4 w-4"/> 重新編輯</button>
                       
                       <div className="h-6 w-px bg-slate-200 mx-2 hidden sm:block"></div>
                       <div className="flex gap-1 bg-slate-100 p-1 rounded-lg">
                          <button onClick={() => setPaperOrientation('portrait')} className={`px-3 py-1.5 text-sm rounded-md transition-all ${paperOrientation === 'portrait' ? 'bg-white shadow text-emerald-600 font-bold' : 'text-slate-600 hover:text-emerald-600'}`}>A4直印</button>
                          <button onClick={() => setPaperOrientation('landscape')} className={`px-3 py-1.5 text-sm rounded-md transition-all ${paperOrientation === 'landscape' ? 'bg-white shadow text-emerald-600 font-bold' : 'text-slate-600 hover:text-emerald-600'}`}>A4橫印</button>
                       </div>
                       
                       <div className="h-6 w-px bg-slate-200 mx-2 hidden sm:block"></div>
                       <div className="flex items-center bg-slate-50 border border-slate-200 rounded-lg p-1">
                          <span className="text-xs font-bold text-slate-500 px-2">方格</span>
                          <button onClick={() => setGridStyle(GridStyle.NONE)} className={`px-2 py-1 text-xs font-medium rounded transition-all ${gridStyle === GridStyle.NONE ? 'bg-white shadow text-emerald-600 font-bold' : 'text-slate-600 hover:text-emerald-600'}`}>空白</button>
                          <button onClick={() => setGridStyle(GridStyle.TIAN)} className={`px-2 py-1 text-xs font-medium rounded transition-all ${gridStyle === GridStyle.TIAN ? 'bg-white shadow text-emerald-600 font-bold' : 'text-slate-600 hover:text-emerald-600'}`}>十字</button>
                          <button onClick={() => setGridStyle(GridStyle.MI)} className={`px-2 py-1 text-xs font-medium rounded transition-all ${gridStyle === GridStyle.MI ? 'bg-white shadow text-emerald-600 font-bold' : 'text-slate-600 hover:text-emerald-600'}`}>米字</button>
                       </div>

                       <div className="h-6 w-px bg-slate-200 mx-2 hidden sm:block"></div>
                       <div className="flex gap-1 bg-slate-100 p-1 rounded-lg">
                          <button onClick={() => setMode(PracticeMode.READING)} className={`px-3 py-1.5 text-sm rounded-md transition-all ${mode === PracticeMode.READING ? 'bg-white shadow text-emerald-600 font-bold' : 'text-slate-600 hover:text-emerald-600'}`}>閱讀模式</button>
                          <button onClick={() => setMode(PracticeMode.WRITING)} className={`px-3 py-1.5 text-sm rounded-md transition-all ${mode === PracticeMode.WRITING ? 'bg-white shadow text-emerald-600 font-bold' : 'text-slate-600 hover:text-emerald-600'}`}>寫字模式</button>
                       </div>
                    </div>

                    <div className="flex gap-2">
                      <div className="flex items-center bg-slate-50 border border-slate-200 rounded-lg p-1">
                         <span className="text-xs font-bold text-slate-500 px-2 border-r mr-1">國字</span>
                         <button onClick={() => resetVisibility('char', true)} className="px-2 py-1 text-xs hover:text-red-600 font-medium hover:bg-red-50 rounded transition-colors">挖空</button>
                         <button onClick={() => resetVisibility('char', false)} className="px-2 py-1 text-xs hover:text-blue-600 font-medium hover:bg-blue-50 rounded transition-colors">顯示</button>
                      </div>
                      <div className="flex items-center bg-slate-50 border border-slate-200 rounded-lg p-1">
                         <span className="text-xs font-bold text-slate-500 px-2 border-r mr-1">注音</span>
                         <button onClick={() => resetVisibility('zhuyin', true)} className="px-2 py-1 text-xs hover:text-red-600 font-medium hover:bg-red-50 rounded transition-colors">挖空</button>
                         <button onClick={() => resetVisibility('zhuyin', false)} className="px-2 py-1 text-xs hover:text-blue-600 font-medium hover:bg-blue-50 rounded transition-colors">顯示</button>
                      </div>
                    </div>
                 </div>
              )}

              {articleData && (
                <div id="worksheet-area" className="bg-slate-100 print:bg-white print:rounded-none rounded-xl overflow-hidden print:overflow-visible transition-all duration-700 ease-in-out shadow-inner print:shadow-none">
                  <WorksheetPreview article={articleData} mode={mode} gridStyle={gridStyle} paperOrientation={paperOrientation} onUpdateCharacter={handleUpdateCharacter} />
                </div>
              )}
              
              {isLoading && (
                <div className="fixed inset-0 bg-white/80 backdrop-blur-sm z-50 flex flex-col items-center justify-center">
                  <div className="w-16 h-16 border-4 border-t-emerald-600 border-emerald-100 rounded-full animate-spin mb-6 shadow-lg"></div>
                  <p className="text-2xl font-bold text-emerald-800 drop-shadow-sm animate-pulse">正在為您產生練習卷...</p>
                </div>
              )}

              <Modal isOpen={showPdfModal} icon={Info} title="建議使用原生 PDF 儲存" footer={<React.Fragment><button onClick={() => setShowPdfModal(false)} className="px-4 py-2 bg-slate-100 text-slate-700 font-medium rounded-lg hover:bg-slate-200 transition-colors">返回</button><button onClick={handleDownloadPDF} disabled={isDownloadingPdf} className="px-4 py-2 text-slate-400 font-medium hover:text-slate-600 transition-colors">{isDownloadingPdf ? '處理中...' : '強制下載舊版'}</button></React.Fragment>}>
                因為您使用了<strong>直式排版</strong>，傳統的截圖下載方式容易發生文字切斷的問題。<br/><br/>點擊上方白色的 <strong className="text-emerald-700">「存 PDF (推薦)」</strong> 按鈕，並在視窗中選擇 <strong>「另存為 PDF」</strong>，這樣存出來的格式會最完美！
              </Modal>

              <Modal isOpen={showPrintModal} icon={Printer} title="準備儲存 PDF..." footer={<button onClick={() => setShowPrintModal(false)} className="px-4 py-2 bg-emerald-600 text-white font-medium rounded-lg hover:bg-emerald-700 transition-all shadow-md">我知道了</button>}>
                系統即將開啟對話框以供儲存 PDF...<br/><br/>
                <strong className="text-red-500">⚠️ 溫馨提醒：</strong> 請確保將目的地更改為 <strong>「另存為 PDF」</strong>。<br/><br/>
                若沒自動跳出視窗請按快捷鍵：<br/>
                <span className="inline-block bg-slate-100 px-3 py-1 rounded-lg text-slate-800 font-mono mt-3 mb-2 border border-slate-200">Windows: Ctrl + P</span><br/>
                <span className="inline-block bg-slate-100 px-3 py-1 rounded-lg text-slate-800 font-mono border border-slate-200">Mac: Cmd + P</span>
              </Modal>
            </main>
          </div>
        </React.Fragment>
      );
    };

    // 渲染應用程式
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
